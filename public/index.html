<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing & Request System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <style>
        /* Tambahkan CSS custom di sini */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }
        
        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .stat-card {
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h4 class="text-white text-center mb-4">
                        <i class="fas fa-ticket-alt"></i> Ticketing System
                    </h4>
                    <ul class="nav flex-column px-2">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" onclick="showPage('dashboard')">
                                <i class="fas fa-chart-pie me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('tickets')">
                                <i class="fas fa-ticket-alt me-2"></i> Tickets
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('categories')">
                                <i class="fas fa-folder me-2"></i> Categories
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('users')">
                                <i class="fas fa-users me-2"></i> Users
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('settings')">
                                <i class="fas fa-cog me-2"></i> Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div id="page-content">
                    <!-- Content will be loaded here dynamically -->
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- API Bridge -->
    <script src="/api.js"></script>
    
    <!-- Main Application Script -->
    <script>
        // Global Variables
        let currentUser = null;
        let currentPage = 'dashboard';
        
        // Initialize App
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadDashboard();
        });
        
        // Check Login Status
        async function checkLoginStatus() {
            const token = sessionStorage.getItem('authToken');
            if (token) {
                // User is logged in
                currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
                updateUIForLoggedInUser();
            }
        }
        
        // Login Function
        async function handleLogin(username, password) {
            try {
                showLoading(true);
                const result = await loginUser(username, password);
                
                if (result.success) {
                    currentUser = result.user;
                    sessionStorage.setItem('authToken', 'logged_in');
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUIForLoggedInUser();
                    Swal.fire('Success', 'Welcome ' + currentUser.fullname, 'success');
                } else {
                    Swal.fire('Error', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to login: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Load Dashboard Data
        async function loadDashboard() {
            try {
                showLoading(true);
                const data = await getDashboardData();
                renderDashboard(data);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                Swal.fire('Error', 'Failed to load dashboard data', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Render Dashboard
        function renderDashboard(data) {
            const pageContent = document.getElementById('page-content');
            pageContent.innerHTML = `
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Dashboard</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadDashboard()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card bg-primary text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title">Total Tickets</h6>
                                        <h2 class="mb-0">${data.total || 0}</h2>
                                    </div>
                                    <i class="fas fa-ticket-alt fa-3x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card bg-success text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title">Solved</h6>
                                        <h2 class="mb-0">${data.solved || 0}</h2>
                                    </div>
                                    <i class="fas fa-check-circle fa-3x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card bg-warning text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title">In Progress</h6>
                                        <h2 class="mb-0">${data.onProses || 0}</h2>
                                    </div>
                                    <i class="fas fa-spinner fa-3x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card bg-danger text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title">Open</h6>
                                        <h2 class="mb-0">${data.open || 0}</h2>
                                    </div>
                                    <i class="fas fa-exclamation-circle fa-3x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Recent Tickets</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Ticket ID</th>
                                        <th>Requester</th>
                                        <th>Category</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${renderTicketsTable(data.tickets || [])}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Render Tickets Table
        function renderTicketsTable(tickets) {
            if (!tickets || tickets.length === 0) {
                return '<tr><td colspan="5" class="text-center text-muted">No tickets found</td></tr>';
            }
            
            return tickets.slice(0, 10).map(ticket => `
                <tr>
                    <td><code>${ticket.ticket_id}</code></td>
                    <td>${ticket.nama}</td>
                    <td>${ticket.kategori}</td>
                    <td><span class="badge bg-${getStatusColor(ticket.status)}">${ticket.status}</span></td>
                    <td>${formatDate(ticket.created_at)}</td>
                </tr>
            `).join('');
        }
        
        // Helper Functions
        function getStatusColor(status) {
            const colors = {
                'Open': 'danger',
                'On Proses': 'warning',
                'Pending': 'info',
                'Solved': 'success',
                'Reject': 'secondary'
            };
            return colors[status] || 'secondary';
        }
        
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID');
        }
        
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.remove('d-none');
                overlay.style.position = 'fixed';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.background = 'rgba(255,255,255,0.8)';
                overlay.style.display = 'flex';
                overlay.style.justifyContent = 'center';
                overlay.style.alignItems = 'center';
                overlay.style.zIndex = '9999';
            } else {
                overlay.classList.add('d-none');
            }
        }
        
        function updateUIForLoggedInUser() {
            // Update UI based on logged in user
            console.log('User logged in:', currentUser);
        }
        
        function showPage(page) {
            currentPage = page;
            // Update active nav
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.closest('.nav-link').classList.add('active');
            
            // Load page content
            switch(page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'tickets':
                    loadTickets();
                    break;
                // Add more cases for other pages
            }
        }
        
        async function loadTickets() {
            // Implement load tickets functionality
            Swal.fire('Info', 'Tickets page coming soon', 'info');
        }
    </script>
</body>
</html>
